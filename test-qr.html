<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp QR Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #1e293b;
      color: white;
      padding: 20px;
      text-align: center;
    }
    .container {
      max-width: 400px;
      margin: 0 auto;
    }
    .status {
      padding: 15px;
      background: #334155;
      border-radius: 10px;
      margin-bottom: 20px;
    }
    .connected { background: #065f46; }
    .qr-box {
      background: white;
      padding: 20px;
      border-radius: 15px;
      display: inline-block;
      margin: 20px 0;
    }
    .loading {
      color: #10b981;
      font-size: 18px;
    }
    .btn {
      background: #10b981;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      margin: 10px;
    }
    .btn:hover { background: #059669; }
    .btn:disabled { background: #64748b; cursor: not-allowed; }
    img {
      width: 250px;
      height: 250px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📱 WhatsApp QR Test</h1>

    <div class="status" id="status">
      <p>Status: <span id="statusText">Memuat...</span></p>
      <p>Phone: <span id="phone">-</span></p>
    </div>

    <div id="qrContainer">
      <button class="btn" id="connectBtn" onclick="connectWA()">
        Generate QR Code
      </button>
    </div>

    <div id="sendSection" style="display:none; margin-top:20px;">
      <hr style="border-color: #475569; margin: 20px 0;">
      <h3>Test Kirim Pesan</h3>
      <input type="text" id="phoneInput" placeholder="Nomor HP (08xx)"
             style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #475569; background: #1e293b; color: white; margin: 10px 0;">
      <textarea id="messageInput" rows="3" placeholder="Pesan"
               style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #475569; background: #1e293b; color: white; margin: 10px 0;">Halo, ini pesan test dari WALIKELASPRO</textarea>
      <button class="btn" onclick="sendMessage()">Kirim Pesan</button>
    </div>
  </div>

  <script>
    let currentQR = null;
    let isConnected = false;

    async function fetchStatus() {
      try {
        const res = await fetch('/api/whatsapp/status');
        const data = await res.json();

        document.getElementById('statusText').textContent = data.connected ? 'TERHUBUNG ✅' : (data.hasQR ? 'QR Available' : 'Belum Terhubung');
        document.getElementById('phone').textContent = data.phone || '-';
        document.getElementById('status').className = 'status' + (data.connected ? ' connected' : '');

        isConnected = data.connected;

        if (data.connected) {
          document.getElementById('sendSection').style.display = 'block';
          document.getElementById('connectBtn').textContent = 'WhatsApp Terhubung';
          document.getElementById('connectBtn').disabled = true;
        }

        if (data.qr && !data.connected) {
          currentQR = data.qr;
          showQR(data.qr);
        }

      } catch (err) {
        console.error('Error:', err);
        document.getElementById('statusText').textContent = 'Error: ' + err.message;
      }
    }

    function showQR(qrData) {
      const container = document.getElementById('qrContainer');
      container.innerHTML = `
        <div class="qr-box">
          <img src="${qrData}" alt="QR Code">
        </div>
        <p class="loading">📱 Scan QR Code dengan WhatsApp Anda</p>
        <p style="font-size:12px; color:#94a3b8;">
          WhatsApp → Setelan → Perangkat Tertaut → Tautkan Perangkat
        </p>
        <button class="btn" onclick="fetchStatus()">🔄 Refresh</button>
      `;
    }

    async function connectWA() {
      const btn = document.getElementById('connectBtn');
      btn.disabled = true;
      btn.textContent = '⏳ Menyiapkan...';

      try {
        const res = await fetch('/api/whatsapp/connect', { method: 'POST' });
        const data = await res.json();

        if (data.success) {
          document.getElementById('statusText').textContent = '⏳ QR Code sedang di-generate...';
          pollQR();
        } else {
          btn.disabled = false;
          btn.textContent = 'Generate QR Code';
          alert('Error: ' + data.error);
        }
      } catch (err) {
        btn.disabled = false;
        btn.textContent = 'Generate QR Code';
        alert('Error: ' + err.message);
      }
    }

    function pollQR() {
      if (isConnected) return;

      fetchStatus();

      if (!isConnected) {
        setTimeout(pollQR, 2000);
      }
    }

    async function sendMessage() {
      const phone = document.getElementById('phoneInput').value;
      const message = document.getElementById('messageInput').value;

      if (!phone || !message) {
        alert('Lengkapi nomor HP dan pesan');
        return;
      }

      try {
        const res = await fetch('/api/whatsapp/send', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone, message })
        });

        if (res.ok) {
          alert('✅ Pesan berhasil dikirim!');
        } else {
          const data = await res.json();
          alert('Error: ' + data.error);
        }
      } catch (err) {
        alert('Error: ' + err.message);
      }
    }

    // Initial load
    fetchStatus();

    // Poll every 3 seconds
    setInterval(fetchStatus, 3000);
  </script>
</body>
</html>
