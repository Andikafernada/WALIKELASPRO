# Nginx Configuration for WALIKELASPRO
# Place in /etc/nginx/sites-available/walas.my.id

server {
    listen 80;
    listen [::]:80;
    server_name walas.my.id;

    # Redirect to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name walas.my.id;

    # SSL Configuration (Cloudflare handles this if Full/Full Strict mode)
    # Uncomment below if using self-managed SSL
    # ssl_certificate /etc/ssl/certs/walas.my.id.crt;
    # ssl_certificate_key /etc/ssl/private/walas.my.id.key;

    # If Cloudflare SSL, use the following:
    # SSL is terminated at Cloudflare, traffic between Cloudflare and Nginx is HTTP

    # Logging
    access_log /var/log/nginx/walas.my.id.access.log;
    error_log /var/log/nginx/walas.my.id.error.log;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Proxy to Node.js app
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }
}
